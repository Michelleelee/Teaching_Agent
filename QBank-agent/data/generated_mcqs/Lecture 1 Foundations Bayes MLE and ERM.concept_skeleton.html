    // Transform Data for D3

    // --- D3 Visualization Logic ---

    const width = window.innerWidth;
    const height = window.innerHeight;
    
    // Zoom behavior
    const zoom = d3.zoom()

        .on("zoom", (event) => {
            g.attr("transform", event.transform);
        });

    const svg = d3.select("#viz-container").append("svg")
        .attr("width", width)
        .attr("height", height)
        .call(zoom)
        .on("dblclick.zoom", null); 

    const g = svg.append("g").attr("transform", "translate(100,0)");

    let i = 0,
        duration = 500,
        root;

    const treeMap = d3.tree().nodeSize([30, 250]); 

    root = d3.hierarchy(rootData, d => d.children);
    root.x0 = height / 2;
    root.y0 = 0;

    // Collapse after the second level initially (show topics, collapse concepts)
    // Adjust depth check to change default collapsed state
    root.children.forEach(d => {
        if(d.children) {
             // Collapse concepts by default
            d.children.forEach(collapse);
        }
    });
    
    update(root);
    
    const initialTransform = d3.zoomIdentity.translate(150, height/2).scale(1);
    svg.call(zoom.transform, initialTransform);


    function collapse(d) {
        if(d.children) {
            d._children = d.children;
            d._children.forEach(collapse);
            d.children = null;
        }
    }

    function expandAll() {
        if (!root.children && !root._children) return;
        expand(root);
        update(root);
    }
    
    function expand(d) {
        if (d._children) {
            d.children = d._children;
            d._children = null;
        }
        if (d.children) d.children.forEach(expand);
    }
    
    function collapseAll() {
        if (root.children) {
            root.children.forEach(collapse);
            update(root);
        }
    }

    function update(source) {
        const treeData = treeMap(root);

        const nodes = treeData.descendants(),
              links = treeData.links();

        nodes.forEach(d => { d.y = d.depth * 280; }); 

        const node = g.selectAll('g.node')
            .data(nodes, d => d.id || (d.id = ++i));

        const nodeEnter = node.enter().append('g')
            .attr('class', d => `node node-level-${d.depth}`)
            .attr("transform", d => `translate(${source.y0},${source.x0})`)
            .on('click', click)
            .on('mouseover', showTooltip)
            .on('mouseout', hideTooltip);

        nodeEnter.append('circle')
            .attr('class', 'node')
            .attr('r', 1e-6)
            .style("fill", d => d._children ? "#fff" : null); 

        nodeEnter.append('text')
            .attr("dy", ".35em")
            .attr("x", d => d.children || d._children ? -13 : 13)
            .attr("text-anchor", d => d.children || d._children ? "end" : "start")
            .text(d => truncate(d.data.name, 40))
            .style('fill-opacity', 1e-6);

        const nodeUpdate = node.merge(nodeEnter).transition().duration(duration)
            .attr("transform", d => `translate(${d.y},${d.x})`);

        nodeUpdate.select('circle')
            .attr('r', d => d.depth === 3 ? 3 : (d.depth === 0 ? 8 : 5))
            .style("fill", d => d._children ? "#fff" : ""); 

        nodeUpdate.select('text')
            .style('fill-opacity', 1);

        const nodeExit = node.exit().transition().duration(duration)
            .attr("transform", d => `translate(${source.y},${source.x})`)
            .remove();

        nodeExit.select('circle').attr('r', 1e-6);
        nodeExit.select('text').style('fill-opacity', 1e-6);

        const link = g.selectAll('path.link')
            .data(links, d => d.target.id);

        const linkEnter = link.enter().insert('path', "g")
            .attr('class', 'link')
            .attr('d', d => {
                const o = {x: source.x0, y: source.y0};
                return diagonal(o, o);
            });

        const linkUpdate = link.merge(linkEnter).transition().duration(duration)
            .attr('d', d => diagonal(d.source, d.target));

        const linkExit = link.exit().transition().duration(duration)
            .attr('d', d => {
                const o = {x: source.x, y: source.y};
                return diagonal(o, o);
            })
            .remove();

        nodes.forEach(d => {
            d.x0 = d.x;
            d.y0 = d.y;
        });

        function click(event, d) {
            if (d.children) {
                d._children = d.children;
                d.children = null;
            } else {
                d.children = d._children;
                d._children = null;
            }
            update(d);
        }
    }

    function diagonal(s, d) {
        return `M ${s.y} ${s.x}
                C ${(s.y + d.y) / 2} ${s.x},
                  ${(s.y + d.y) / 2} ${d.x},
                  ${d.y} ${d.x}`;
    }

    function truncate(str, max) {
        if (!str) return "";
        return str.length > max ? str.substr(0, max-1) + '…' : str;
    }
    
    function showTooltip(event, d) {
        const tooltip = document.getElementById("tooltip");
        const type = d.depth === 0 ? 'Lecture' : (d.depth === 1 ? 'Topic' : (d.depth === 2 ? 'Concept' : 'Fact/Intent'));
        tooltip.innerHTML = `<strong>${type}</strong><br>${d.data.name}`;
        tooltip.style.opacity = 1;
        tooltip.style.left = (event.pageX + 10) + "px";
        tooltip.style.top = (event.pageY + 10) + "px";
    }

    function hideTooltip() {
        const tooltip = document.getElementById("tooltip");
        tooltip.style.opacity = 0;
    }
    
    window.addEventListener('resize', () => {
        svg.attr("width", window.innerWidth).attr("height", window.innerHeight);
    });

</script>

</body>
</html>
